name: Privacy Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  privacy-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check public template privacy
        run: python scripts/privacy_guard.py
